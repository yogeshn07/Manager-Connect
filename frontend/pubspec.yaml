name: manager_connect
description: Private manager community platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.9.0 <4.0.0"
  flutter: ">=3.38.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^3.0.3
  riverpod_annotation: ^3.0.3

  # Navigation
  go_router: ^14.1.0

  # Backend
  supabase_flutter: ^2.5.0

  # Data Models
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0

  # Functional Result Types
  fpdart: ^1.1.0

  # Push Notifications
  firebase_core: ^3.3.0
  firebase_messaging: ^15.0.4
  flutter_local_notifications: ^17.2.2

  # Images
  cached_network_image: ^3.3.1
  image_picker: ^1.1.2
  image: ^4.2.0

  # Utilities
  intl: ^0.19.0
  connectivity_plus: ^6.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code Generation
  build_runner: ^2.4.11
  riverpod_generator: ^3.0.3
  freezed: ^3.2.1
  json_serializable: ^6.9.5

  # Testing
  mocktail: ^1.0.4

  # Lints
  flutter_lints: ^4.0.0

# path_provider_foundation 2.6.0 depends on objective_c 9.4.1 which has a
# native asset build hook that crashes on Windows paths with spaces
# (dart-lang/native#2993). Version 2.4.4 has an identical public API but
# uses Swift method channels instead of objective_c FFI — no build hook.
# Remove this override when dart-lang/native#2993 is fixed.
dependency_overrides:
  path_provider_foundation: 2.4.4

flutter:
  uses-material-design: true
  # Font files will be added when Inter .ttf files are placed in assets/fonts/Inter/
  # fonts:
  #   - family: Inter
  #     fonts:
  #       - asset: assets/fonts/Inter/Inter-Regular.ttf
  #       - asset: assets/fonts/Inter/Inter-Medium.ttf
  #         weight: 500
  #       - asset: assets/fonts/Inter/Inter-SemiBold.ttf
  #         weight: 600
  #       - asset: assets/fonts/Inter/Inter-Bold.ttf
  #         weight: 700
  assets:
    - assets/images/
    - assets/icons/
